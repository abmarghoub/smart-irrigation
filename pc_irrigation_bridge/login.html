<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Connexion — Irrigation</title>
<style>
:root{--bg:#0f1419;--card:#1a2332;--txt:#e7ecf3;--muted:#8b9cb3;--acc:#3d9cf9}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.panel{background:var(--card);border-radius:10px;padding:1.5rem;border:1px solid #2a3544;max-width:380px;width:100%}
h1{margin:0 0 1rem;font-size:1.2rem}
label{display:block;font-size:.8rem;color:var(--muted);margin:.5rem 0 .2rem}
input{width:100%;padding:.55rem;border-radius:8px;border:1px solid #2a3544;background:#0f1419;color:var(--txt)}
button{width:100%;margin-top:1rem;padding:.6rem;border:none;border-radius:8px;background:var(--acc);color:#fff;font-weight:600;cursor:pointer}
#msg{margin-top:.75rem;font-size:.85rem;color:#ff6b6b;min-height:1.2em}
a{color:var(--acc)}
</style>
</head>
<body>
<div class="panel">
<h1>Connexion</h1>
<form id="login">
<label>Email</label>
<input type="email" id="email" required autocomplete="username"/>
<label>Mot de passe</label>
<input type="password" id="password" required autocomplete="current-password"/>
<button type="submit">Se connecter</button>
<p id="msg"></p>
</form>
<p style="margin-top:1rem;font-size:.85rem"><a href="/">Retour dashboard</a> · <a href="#" id="forgot">Mot de passe oublie ?</a></p>
<script>
async function loadConfig(){
  const r=await fetch("/api/auth/config");
  return r.ok?r.json():{};
}
document.getElementById("login").onsubmit=async(e)=>{
  e.preventDefault();
  const msg=document.getElementById("msg");
  msg.textContent="";
  const cfg=await loadConfig();
  if(!cfg.auth_enabled){
    sessionStorage.removeItem("irrigation_token");
    location.href="/";
    return;
  }
  const url=(cfg.supabase_url||"").replace(/\/$/,"");
  const key=cfg.supabase_anon_key||"";
  if(!url||!key){ msg.textContent="Supabase non configure sur le serveur."; return; }
  try{
    const r=await fetch(url+"/auth/v1/token?grant_type=password",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":key},
      body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})
    });
    const j=await r.json();
    if(!r.ok||!j.access_token){ msg.textContent=j.error_description||j.msg||"Echec connexion"; return; }
    sessionStorage.setItem("irrigation_token",j.access_token);
    const me=await fetch("/api/me",{headers:{Authorization:"Bearer "+j.access_token}});
  if(me.ok){
    const u=await me.json();
    if(u.is_admin){
      const next=new URLSearchParams(location.search).get("next");
      location.href=(next&&next.startsWith("/admin"))?next:"/admin";
      return;
    }
  }
  const next=new URLSearchParams(location.search).get("next");
  location.href=next&&next.startsWith("/")&&!next.startsWith("/admin")?next:"/";
  }catch(err){ msg.textContent=String(err); }
};
loadConfig().then(cfg=>{
  if(cfg.auth_enabled===false) location.href="/";
});
document.getElementById("forgot").onclick=async(e)=>{
  e.preventDefault();
  const msg=document.getElementById("msg");
  const cfg=await loadConfig();
  const url=(cfg.supabase_url||"").replace(/\/$/,"");
  const key=cfg.supabase_anon_key||"";
  const email=document.getElementById("email").value.trim();
  if(!email){ msg.textContent="Entrez votre email puis recliquez."; return; }
  if(!url||!key){ msg.textContent="Supabase non configure."; return; }
  try{
    const r=await fetch(url+"/auth/v1/recover",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":key},
      body:JSON.stringify({email})
    });
    if(r.ok) msg.textContent="Email de reinitialisation envoye (verifiez vos spams).";
    else msg.textContent="Echec envoi email.";
  }catch(err){ msg.textContent=String(err); }
};
</script>
</body>
</html>
