# Configuration Mosquitto 2.x pour ESP32 + bridge Python sur le reseau local.
# Remplace (ou fusionne avec) le fichier dans :
#   C:\Program Files\mosquitto\mosquitto.conf
# puis redemarrez le service « Mosquitto Broker » (services.msc).
#
# - listener 1883 : ecoute sur toutes les interfaces (plus de « local only »).
# - allow_anonymous true : tests sans mot de passe (a durcir en production).

listener 1883
allow_anonymous true

# Desactive la persistance sur disque (evite soucis de droits dans Program Files).
persistence false

# Limite les logs console si vous lancez mosquitto -c ce fichier -v
# log_type error
# log_type warning
# log_type notice
# log_type information
